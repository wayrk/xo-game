<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>لعبة إكس أو — XO</title>
<link rel="manifest" href="manifest.webmanifest">
<style>
  :root{
    --bg1:#0f172a; --bg2:#1e293b; --card:#1e293b; --accent:#38bdf8;
    --x:#f43f5e; --o:#22d3ee; --win:#22c55e; --txt:#e2e8f0; --muted:#94a3b8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    font-family:-apple-system,"Segoe UI",Roboto,"Noto Sans Arabic",Arial,sans-serif;
    background:radial-gradient(circle at 30% 20%, #1e293b, #0f172a 70%);
    color:var(--txt); display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:1.2vh;
    /* الارتفاع الحقيقي للنافذة — يُضبط بـ JS عبر --vh */
    height:calc(var(--vh, 1vh) * 100);
    max-height:calc(var(--vh, 1vh) * 100);
    padding:max(8px, env(safe-area-inset-top)) 12px max(8px, env(safe-area-inset-bottom));
    overflow:hidden;
  }
  h1{font-size:clamp(1.1rem,4.2vw,1.7rem); margin:0; letter-spacing:1px;
     background:linear-gradient(90deg,var(--x),var(--o)); -webkit-background-clip:text;
     background-clip:text; color:transparent; font-weight:800; flex:0 0 auto;}
  .sub{color:var(--muted); font-size:clamp(.65rem,2.2vw,.8rem); margin-top:-2px; text-align:center; flex:0 0 auto;}
  .modes{display:flex; gap:6px; flex-wrap:wrap; justify-content:center; flex:0 0 auto;}
  .modes button{
    background:var(--card); color:var(--txt); border:1px solid #334155;
    padding:7px 12px; border-radius:12px; font-size:clamp(.78rem,2.6vw,.9rem); cursor:pointer;
    transition:.2s; font-weight:600;
  }
  .modes button.active{background:var(--accent); color:#082f49; border-color:var(--accent);}
  .modes button:active{transform:scale(.96);}
  .status{font-size:clamp(.9rem,3.4vw,1.15rem); font-weight:700; min-height:1.3em; text-align:center; margin:0; flex:0 0 auto;}
  .board{
    display:grid; grid-template-columns:repeat(3,1fr); gap:2.5%;
    /* الحجم يُضبط بـ JS = أصغر بعد قياس المساحة الفعلية (بلا قص أبداً) */
    width:var(--bsize, 300px); height:var(--bsize, 300px);
    flex:0 0 auto;
  }
  .cell{
    background:var(--card); border-radius:14px; display:flex;
    align-items:center; justify-content:center;
    font-size:calc(var(--bsize) * 0.18);
    font-weight:800; cursor:pointer; user-select:none; transition:.15s;
    border:2px solid #334155;
  }
  .cell:active{transform:scale(.95);}
  .cell.x{color:var(--x);} .cell.o{color:var(--o);}
  .mk{font-weight:900;} .mk.x{color:var(--x);} .mk.o{color:var(--o);}
  .cell.win{background:var(--win); color:#052e16; border-color:var(--win);
            animation:pop .4s ease;}
  @keyframes pop{0%{transform:scale(.7);}60%{transform:scale(1.12);}100%{transform:scale(1);}}
  .score{display:flex; gap:8px; font-size:clamp(.8rem,2.8vw,.95rem); flex-wrap:nowrap; justify-content:center; flex:0 0 auto;}
  .score div{background:var(--card); padding:5px 12px; border-radius:12px; border:1px solid #334155;}
  .score b.x{color:var(--x);} .score b.o{color:var(--o);}
  .actions{display:flex; gap:8px; flex:0 0 auto; flex-wrap:wrap; justify-content:center;}
  .actions button{
    background:linear-gradient(135deg,var(--accent),#0ea5e9); color:#082f49;
    border:none; padding:9px 18px; border-radius:12px; font-size:clamp(.85rem,3vw,1rem);
    font-weight:700; cursor:pointer; transition:.2s;
  }
  .actions button.ghost{background:transparent; color:var(--muted); border:1px solid #334155;}
  .actions button:active{transform:scale(.96);}
  footer{color:var(--muted); font-size:.68rem; margin:0; flex:0 0 auto;}

  /* panel يتدفق عادي */
  .panel{display:contents;}

  /* الشاشة العريضة القصيرة (landscape): صف أفقي — الـ JS يضبط حجم اللوحة */
  @media (max-height:520px) and (min-aspect-ratio:1/1){
    body{flex-direction:row; flex-wrap:nowrap; align-items:center; justify-content:center; gap:3vw;}
    .sub,footer{display:none;}
    .panel{display:flex; flex-direction:column; align-items:center; gap:1.5vh; max-width:46vw;}
    h1{position:fixed; top:2px; left:0; right:0; font-size:clamp(.85rem,2.6vh,1.2rem); z-index:5;}
    .modes{order:-1;}
  }
</style>
</head>
<body>
  <h1>لعبة إكس أو</h1>
  <div class="sub">Tic-Tac-Toe · صُنعت بواسطة OpenClaw</div>

  <div class="modes">
    <button id="mPvP">لاعبان</button>
    <button id="mEasy">سهل</button>
    <button id="mHard" class="active">صعب (لا يُهزم)</button>
  </div>

  <div class="board" id="board"></div>

  <div class="panel">
    <div class="status" id="status">دورك <span class="mk x">✕</span></div>
    <div class="score">
      <div><span class="mk x">✕</span> <b class="x" id="sx">0</b></div>
      <div>تعادل <b id="sd">0</b></div>
      <div><span class="mk o">◯</span> <b class="o" id="so">0</b></div>
    </div>
    <div class="actions">
      <button id="reset">جولة جديدة</button>
      <button id="clear" class="ghost">تصفير النتيجة</button>
    </div>
  </div>

  <footer>v1.3 · يعمل أوفلاين · OpenClaw</footer>

<script src="game.js"></script>
</body>
</html>
